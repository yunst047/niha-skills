# Koyuki vs ponytail vs no-skill: same model, same tasks, identical rulers.
# Measures code LOC (deterministic) and tokens/cost/latency (API telemetry).
#
#   Run:   npx promptfoo@latest eval -c benchmarks/promptfooconfig.yaml --repeat 10
#   View:  npx promptfoo@latest view
#
# Needs ANTHROPIC_API_KEY in the environment or a .env file (see README.md).
# The ponytail arm vendors ponytail's SKILL.md (MIT, © Dietrich Gebert) verbatim
# so the comparison is reproducible and fair.
description: "Koyuki (economy) vs ponytail (full) vs no-skill — same model, same tasks. Code LOC + tokens/cost via API telemetry."

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config: { max_tokens: 8192, temperature: 1 }
  - id: anthropic:messages:claude-sonnet-4-6
    config: { max_tokens: 8192, temperature: 1 }
  - id: anthropic:messages:claude-opus-4-8
    config: { max_tokens: 8192, temperature: 1 }

prompts:
  - id: file://arms/baseline.js
    label: baseline (no skill)
  - id: file://arms/ponytail.js
    label: ponytail (full)
  - id: file://arms/koyuki.js
    label: koyuki (economy)

defaultTest:
  assert:
    - type: javascript
      value: file://loc.js
      metric: code_loc
    - type: javascript
      value: file://correctness.js
      metric: correct

tests:
  - vars: { task: "Write me a Python function that validates email addresses." }
  - vars: { task: "Add debounce to a search input in vanilla JavaScript. It currently fires an API call on every keystroke." }
  - vars: { task: "Write Python code that reads sales.csv and sums the 'amount' column." }
  - vars: { task: "Build me a countdown timer component in React that counts down from a given number of seconds." }
  - vars: { task: "Add rate limiting to my FastAPI endpoint so users can't spam it." }
